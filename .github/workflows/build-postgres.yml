name: Build Postgres pgvector

on:
  workflow_dispatch:
    inputs:
      pg_version:
        description: Postgres version
        required: true
        default: "16.6"
      pgvector_version:
        description: pgvector version
        required: true
        default: "0.8.0"
      runner:
        description: runner label
        required: true
        default: macos-15-large
      platform:
        description: darwin or linux
        required: true
        default: darwin
      arch:
        description: x64 or arm64
        required: true
        default: x64

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bison flex
          echo "/opt/homebrew/opt/bison/bin:/usr/local/opt/bison/bin" >> "$GITHUB_PATH"
          echo "/usr/local/opt/bison/bin:/usr/local/opt/flex/bin" >> "$GITHUB_PATH"
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential bison flex pkg-config patchelf
      - name: Pick a pre-15.4 macOS SDK (avoid the strchrnul symbol)
        if: runner.os == 'macOS'
        run: |
          echo 'Available SDKs:'; xcodebuild -showsdks 2>/dev/null | grep -i macos || true
          SDK=''
          for c in $(xcrun --sdk macosx14 --show-sdk-path 2>/dev/null) \
                   $(ls -d /Applications/Xcode_1[456]*.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX1[34].*.sdk 2>/dev/null) \
                   $(ls -d /Library/Developer/CommandLineTools/SDKs/MacOSX1[34].*.sdk 2>/dev/null); do
            [ -d "$c" ] && [ ! -e "$c/usr/include/_strchrnul_marker" ] && SDK="$c" && break
          done
          if [ -z "$SDK" ]; then echo '::error::No pre-15.4 macOS SDK on this runner — cannot build a back-compatible postgres'; exit 1; fi
          echo "Using SDK: $SDK"
          echo "SDKROOT=$SDK" >> $GITHUB_ENV
          echo 'MACOSX_DEPLOYMENT_TARGET=13.0' >> $GITHUB_ENV
      - name: Build Postgres and pgvector
        env:
          PG_VERSION: ${{ inputs.pg_version }}
          PGVECTOR_VERSION: ${{ inputs.pgvector_version }}
          PLATFORM: ${{ inputs.platform }}
          ARCH: ${{ inputs.arch }}
        run: bash studio/scripts/build-postgres-unix.sh
      - name: Guard — reject binary that links macOS 15.4 symbols
        if: runner.os == 'macOS'
        run: |
          TB=$(ls postgres-*-darwin-*.tar.gz 2>/dev/null | head -1)
          rm -rf /tmp/pgcheck && mkdir -p /tmp/pgcheck && tar -xzf "$TB" -C /tmp/pgcheck postgres/bin/initdb
          BIN=/tmp/pgcheck/postgres/bin/initdb
          echo "checking: $BIN (from $TB)"
          if nm -u "$BIN" 2>/dev/null | grep -q strchrnul; then
            echo '::error::built binary references _strchrnul (would dyld-crash on older macOS) — failing before upload'; nm -u "$BIN" | grep strchrnul; exit 1
          fi
          echo 'OK: no _strchrnul reference'
      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          FILE="postgres-${{ inputs.pg_version }}-${{ inputs.platform }}-${{ inputs.arch }}.tar.gz"
          aws --endpoint-url "https://9edc7fbe4a55b0b6489df8e7a120526c.r2.cloudflarestorage.com" \
            s3 cp "$FILE" "s3://ugly-releases/studio/binaries/$FILE" \
            --cache-control "public, max-age=31536000, immutable"
